<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b3001b" />
  <title>PokéScan — scan & value Pokémon cards</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1><span class="pokeball" aria-hidden="true"></span> PokéScan</h1>
    <p class="tagline">Scan a card → identify it → real Cardmarket value</p>
  </header>

  <main>
    <!-- SCAN VIEW -->
    <section id="scan-view" class="view">
      <div class="camera-wrap">
        <video id="camera" playsinline muted autoplay></video>
        <div id="camera-frame" class="card-frame" aria-hidden="true"></div>
        <canvas id="capture-canvas" hidden></canvas>
      </div>

      <div class="scan-controls">
        <button id="capture-btn" class="btn btn-primary" disabled>📷 Capture card</button>
        <label class="btn btn-secondary file-btn">
          🖼️ Upload / take photo
          <input id="file-input" type="file" accept="image/*" capture="environment" hidden />
        </label>
      </div>

      <p id="camera-status" class="status muted"></p>

      <div class="manual-search">
        <p class="or">— or search by name —</p>
        <form id="search-form">
          <input id="search-input" type="search" placeholder='e.g. "Charizard 4/102" or "Pikachu"' autocomplete="off" />
          <button type="submit" class="btn btn-primary">Search</button>
        </form>
      </div>

      <div id="ocr-preview" class="ocr-preview" hidden>
        <img id="ocr-thumb" alt="Captured card" />
        <div class="ocr-text">
          <p id="ocr-status" class="status"></p>
        </div>
      </div>
    </section>

    <!-- RESULTS VIEW -->
    <section id="results-view" class="view" hidden>
      <button class="btn btn-back" data-back>← Scan another</button>
      <h2>Which card is it?</h2>
      <p class="muted small">Tap the match. Variant &amp; set matter — prices differ a lot.</p>
      <form id="results-search-form" class="results-search">
        <input id="results-search-input" type="search" placeholder="Wrong matches? Type the name…" autocomplete="off" />
        <button type="submit" class="btn btn-primary">Go</button>
      </form>
      <div id="results-grid" class="results-grid"></div>
      <p id="results-status" class="status muted"></p>
    </section>

    <!-- DETAIL VIEW -->
    <section id="detail-view" class="view" hidden>
      <button class="btn btn-back" data-back-results>← Back to matches</button>
      <div id="detail" class="detail"></div>
    </section>
  </main>

  <footer class="footer">
    <p class="muted small">
      Prices via <strong>Cardmarket</strong> (EUR), sourced through the pokemontcg.io database.
      Condition is your call — see the guide on each card.
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
